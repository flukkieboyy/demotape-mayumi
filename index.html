<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYUMI TAPE - Cassette Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-screen">
        <div class="intro-content">
            <h1 class="glitch">MAYUMI TAPE</h1>
            
            <div id="loading-section">
                <p id="loading-text">INITIALIZING SYSTEM...</p>
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
            </div>

            <div id="password-section" class="hidden">
                <p>ENTER PASSCODE:</p>
                <input type="password" id="passcode-input" placeholder="****" maxlength="10">
                <button id="submit-btn">ACCESS</button>
                <p id="error-msg" class="hidden">ACCESS DENIED</p>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden">
        
        <div id="notification-box" class="hidden">
            <p>Side A ended. Flip tape?</p>
            <button id="flip-btn">FLIP TO SIDE B</button>
        </div>

        <div class="player-wrapper">
            <div class="cassette">
                <img src="mayumi 2.png" alt="Mayumi Tape" class="cassette-img">
                
                <div class="spool spool-left"><div class="gear"></div></div>
                <div class="spool spool-right"><div class="gear"></div></div>
            </div>

            <div class="controls">
                <div class="status-display">
                    <span id="current-side">SIDE A - TRK 1</span>
                    <span id="time-display">00:00</span>
                </div>
                <div class="buttons">
                    <button id="play-pause-btn">PAUSE</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
